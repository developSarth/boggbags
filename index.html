<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop All – BOGG BAG</title>
  <meta name="description" content="Explore the full BOGG BAG collection. Durable, washable totes for every adventure.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════
       TASK 1 — Full-screen iframe mirroring the reference site
       ═══════════════════════════════════════════════════════════════ -->
  <iframe
    id="site-mirror"
    src="https://boggbag.com/collections/shop-all"
    title="BOGG BAG – Shop All"
    loading="eager"
    allowfullscreen
  ></iframe>

  <!-- ═══════════════════════════════════════════════════════════════
       TASK 2 — Floating Chatbot Widget
       ═══════════════════════════════════════════════════════════════ -->

  <!-- Launcher button -->
  <button id="chat-launcher" aria-label="Open chat">
    <!-- Chat bubble icon -->
    <svg id="chat-icon-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
    </svg>
    <!-- Close X icon -->
    <svg id="chat-icon-close" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <!-- Chat window -->
  <div id="chat-window" aria-hidden="true">
    <!-- Header -->
    <div id="chat-header">
      <div id="chat-header-info">
        <img id="chat-avatar" src="avatar.png" alt="Bea">
        <div>
          <div id="chat-agent-name">Bea</div>
          <div id="chat-status">
            <span id="chat-status-dot"></span>
            Your shopping assistant at Bogg Bag!
          </div>
        </div>
      </div>
      <button id="chat-close-btn" aria-label="Close chat">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
    </div>

    <!-- Messages area -->
    <div id="chat-messages">
      <!-- Welcome message injected by JS -->
    </div>

    <!-- Input area -->
    <div id="chat-input-area">
      <div id="chat-attachment-preview">
        <img id="chat-preview-img" src="" alt="Attachment preview">
        <button type="button" id="chat-remove-attachment" aria-label="Remove attachment">&times;</button>
      </div>
      <form id="chat-form" autocomplete="off">
        <label for="chat-file-upload" id="chat-upload-btn" aria-label="Attach image">
          <span style="font-size: 22px;">🌺</span>
        </label>
        <input type="file" id="chat-file-upload" accept="image/*" style="display: none;">
        <input
          type="text"
          id="chat-input"
          placeholder="Type a message..."
          autocomplete="off"
          aria-label="Type a message"
        >
        <div id="chat-send-wrapper">
          <button type="submit" id="chat-send-btn" aria-label="Send message">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18" style="transform: rotate(45deg); margin-left: -2px; margin-bottom: 2px;">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </form>
      <div id="chat-powered"><span>—</span> Powered by AI <span>—</span></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
